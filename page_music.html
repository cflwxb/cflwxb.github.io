<!-- photos.html -->
<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>照片墙 - 我们的小窝</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .nav-link {
            color: #ff69b4;
        }
        .nav-link:hover {
            color: #ff1493;
        }
        .photo-card {
            margin-bottom: 20px;
            transition: transform 0.3s;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .photo-card:hover {
            transform: scale(1.05);
        }
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .photo-item {
            position: relative;
            overflow: hidden;
            border-radius: 10px;
        }
        .photo-item img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            transition: transform 0.3s;
        }
        .photo-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px;
            transform: translateY(100%);
            transition: transform 0.3s;
        }
        .photo-item:hover img {
            transform: scale(1.1);
        }
        .photo-item:hover .photo-overlay {
            transform: translateY(0);
        }
        .photo-filter {
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .music-player {
            width: 300px;
            margin: 0 auto;
            text-align: center;
        }

        #playlist {
            list-style-type: none;
            padding: 0;
            margin-top: 10px;
        }

        #playlist li {
            cursor: pointer;
            padding: 5px;
            border-bottom: 1px solid #ccc;
        }

        #playlist li:hover {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="index.html">💑 我们的小窝</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="page_note.html">📝 我们的回忆</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="page_photo.html">📸 照片墙</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="page_plan.html">🎯 碎碎念</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link animate__animated animate__fadeIn" href="page_music.html">💕 音乐</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="music-player">
        <audio id="audioPlayer" controls></audio> <!-- 音频播放器元素 -->
        <ul id="playlist">
            <!-- 歌曲列表项，这里示例了两首歌曲，可按需添加更多 -->
            <li data-src="music/qing.mp3">晴-汪苏泷</li>
            <li data-src="music/qingtian.mp3">晴天-周杰伦</li>
        </ul>
    </div>

    <!-- 页脚 -->
    <footer class="bg-light py-4 mt-5">
        <div class="container text-center">
            <p class="mb-0">© 2024 我们的小窝 - 永远相爱 ❤️</p>
        </div>
    </footer>

    <script>

        const audioPlayer = document.getElementById('audioPlayer');
        const playlist = document.getElementById('playlist');
        const listItems = playlist.querySelectorAll('li');

        listItems.forEach((item) => {
            item.addEventListener('click', () => {
                const src = item.dataset.src;
                audioPlayer.src = src;
                audioPlayer.play();
            });
        });
    </script>

    
</body>
</html>
