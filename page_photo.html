<!-- photos.html -->
<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>照片墙 - 我们的小窝</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .nav-link {
            color: #ff69b4;
        }
        .nav-link:hover {
            color: #ff1493;
        }
        .photo-card {
            margin-bottom: 20px;
            transition: transform 0.3s;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .photo-card:hover {
            transform: scale(1.05);
        }
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .photo-item {
            position: relative;
            overflow: hidden;
            border-radius: 10px;
        }
        .photo-item img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            transition: transform 0.3s;
        }
        .photo-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px;
            transform: translateY(100%);
            transition: transform 0.3s;
        }
        .photo-item:hover img {
            transform: scale(1.1);
        }
        .photo-item:hover .photo-overlay {
            transform: translateY(0);
        }
        .photo-filter {
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="index.html">💑 我们的小窝</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="page_note.html">📝 我们的回忆</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="page_photo.html">📸 照片墙</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="page_plan.html">🎯 碎碎念</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link animate__animated animate__fadeIn" href="page_music.html">💕 音乐</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 照片墙内容 -->
    <div class="container my-5">
        <h2 class="text-center mb-4">📸 我们的照片墙</h2>
        

        <!-- 照片网格 -->
        <div class="photo-grid">
            <div class="photo-item">
                <img src="img/1.png" alt="旅行照片">
                <div class="photo-overlay">
                    <h5>动物园</h5>
                    <p>2024.04.05 - 济南</p>
                    <span class="badge bg-primary">旅行</span>
                </div>
            </div>
            <div class="photo-item">
                <img src="img/2.png" alt="旅行照片">
                <div class="photo-overlay">
                    <h5>欢乐海</h5>
                    <p>2024.05.03 - 潍坊</p>
                    <span class="badge bg-success">旅行</span>
                </div>
            </div>
            
            <!-- 更多照片项目 -->
        </div>
    </div>

    <!-- 查看照片大图的模态框 -->
    <div class="modal fade" id="viewPhotoModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">照片详情</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <img src="" class="img-fluid" id="modalImage" alt="照片大图">
                    <div class="mt-3">
                        <h5 id="modalTitle"></h5>
                        <p id="modalDescription"></p>
                        <p id="modalDate"></p>
                        <p id="modalLocation"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="bg-light py-4 mt-5">
        <div class="container text-center">
            <p class="mb-0">© 2024 我们的小窝 - 永远相爱 ❤️</p>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script>
        // 为照片添加点击事件，显示大图
        document.querySelectorAll('.photo-item').forEach(item => {
            item.addEventListener('click', function() {
                const modal = new bootstrap.Modal(document.getElementById('viewPhotoModal'));
                const img = this.querySelector('img');
                const title = this.querySelector('h5').textContent;
                const description = this.querySelector('p').textContent;
                
                document.getElementById('modalImage').src = img.src;
                document.getElementById('modalTitle').textContent = title;
                document.getElementById('modalDescription').textContent = description;
                
                modal.show();
            });
        });
    </script>
</body>
</html>
